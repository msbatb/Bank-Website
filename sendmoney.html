<!DOCTYPE html>
<html>
<head>
    <title>send money</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="homepage.css">
</head>
<body>

    <a class="btn" data-bs-toggle="offcanvas" href="#offcanvasExample" role="button" aria-controls="offcanvasExample">
    <i class="bi bi-justify h1" style="background-color: #504B38; color: aliceblue;"></i>
    </a>
    <div class="offcanvas offcanvas-start" tabindex="-1" id="offcanvasExample" aria-labelledby="offcanvasExampleLabel">
    <div class="offcanvas-header bg-body-secondary">
        <h4 class="offcanvas-title" id="offcanvasExampleLabel">MANU</h4>
        <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
    </div>
    <div class="offcanvas-body bg-dark-subtle" style="font-weight: 400;">
        <a href="home.html">HOME</a>
        <li>ABOUT US</li>
        <li>HISTORY</li>
    </div>
    <a href="login.html" style="justify-content: end; font-size: 25px; color:black; font-weight: bolder;">Log Out</a>
    </div>

    <section class="sendmoney">
        <div class="sendmoney-text" style="margin-top: 250px;">
            <div class="row">
                <div class="col-lg-6" style="text-align: end;">
                    <span>Accound Number</span>
                </div>
                <div class="col-lg-6">
                    <input type="text">
                </div>
            </div>

            <div class="row">
                <div class="col-lg-6 mt-1" style="text-align: end;">
                    <span>Verify Accound Number</span>
                </div>
                <div class="col-lg-6 mt-1">
                    <input type="text">
                </div>
            </div>

            <div class="row">
                <div class="col-lg-6 mt-1" style="text-align: end;">
                    <span>Amount</span>
                </div>
                <div class="col-lg-6 mt-1">
                    <input type="text">
                </div>
            </div>
        </div>
        <button class="send-btn mt-3" data-bs-toggle="modal" data-bs-target="#d1">Send</button>
        <div class="modal" id="d1">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h4 class="modal-title">Amound has been sended.</h4>
                        <button class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-footer">
                        <button class="btn btn-danger" data-bs-dismiss="modal">OK</button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section class="services">
        <h1>Our Services</h1>
        <div class="service-box">
            <div class="row">
                <div class="col-lg-3">
                    <div class="card">Savings Account</div>
                </div>
                <div class="col-lg-3">
                    <div class="card">Personal Loan</div>
                </div>
                <div class="col-lg-3">
                    <div class="card">Credit Card</div>
                </div>
                <div class="col-lg-3">
                    <div class="card">Online Banking</div>
                </div>
            </div>
        </div>
    </section>

    <footer>

    </footer>
